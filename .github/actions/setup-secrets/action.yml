name: Jive Setup Secrets
description: Looks up the secrets required by the pipeline (per package.json's "jive.requiredSecrets") and writes them to GITHUB_ENV.

inputs:
  secrets:
    description: All secrets available to the workflow, as a JSON string
    required: true

runs:
  using: composite
  steps:
    - name: Add Secrets to Env
      shell: bash
      env:
        SECRETS_JSON: ${{ inputs.secrets }}
      run: |
        bun run - <<'BUN'
          // TODO: move action to its own CLI rather than using composite
          if (typeof process.env.SECRETS_JSON === "string") {
            console.log(`::add-mask::${process.env.SECRETS_JSON}`);
          }
          const secrets = JSON.parse(process.env.SECRETS_JSON || "{}");
          for (const value of Object.values(secrets)) {
            if (value) console.log(`::add-mask::${value}`);
          }
          const requiredSecrets = require('./package.json')?.jive?.cicd?.requiredSecrets ?? [];
          const secretsToPass = {};
          const missingSecrets = [];
          console.log(`Setting secrets ${requiredSecrets.join(", ")}`);
          for (const requiredSecret of requiredSecrets) {
            if (requiredSecret in secrets) {
              secretsToPass[requiredSecret] = secrets[requiredSecret];
            } else {
              missingSecrets.push(requiredSecret);
            }
          }
          if (missingSecrets.length > 0) {
            console.log(`Missing the following secrets (required by package.json's jive.requiredSecrets): ${missingSecrets.join(", ")}`);
            process.exit(1);
          }
          for (const [key, value] of Object.entries(secretsToPass)) {
            require("fs").appendFileSync(process.env.GITHUB_ENV, `${key}=${value}\n`);
          }
        BUN
