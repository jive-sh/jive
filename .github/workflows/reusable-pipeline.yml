name: Jive Reusable CI/CD Pipeline

on:
  workflow_call:
    inputs:
      environments:
        type: string
        description: Comma delimited list of environments to deploy to, sequentially.
        required: true
      preview-deploys:
        type: boolean
        description: If true, preview deploys & integration tests against this deployment will be run on PRs 
        required: true
      publish:
        type: boolean
        description: Whether to publish the package to npm when pushing to the default branch
        required: true

jobs:
  pipeline:
    name: Build
    # Only run on PRs or pushes to the repo's default branch
    if: >-
      (
        inputs.preview-deploys &&
        (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
      ) || 
      (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    # For publishing
    permissions:
      contents: read
      id-token: write 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Build Package
        uses: ./actions/build
        with:
          secrets: ${{ toJSON(secrets) }}
      - name: Unit Tests
        uses: ./actions/unit-tests
        with:
          secrets: ${{ toJSON(secrets) }}
      - name: Preview Deploy & Integration Tests
        # https://docs.github.com/en/actions/reference/workflows-and-actions/expressions
        if: >-
          inputs.preview-deploys &&
          (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
        uses: ./actions/deploy
        with:
          publish: false
          environments: Preview
          secrets: ${{ toJSON(secrets) }}
      - name: ${{ inputs.environments }} Deploy & Integration Tests
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: ./actions/deploy
        with:
          publish: ${{ inputs.publish }}
          environments: ${{ inputs.environments }}
          secrets: ${{ toJSON(secrets) }}
