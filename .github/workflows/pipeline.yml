name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  pipeline:
    name: Pipeline
    uses: ./.github/workflows/reusable-pipeline.yml
    secrets: inherit
    with:
      deploy-branches: |
        {
          "main": ["Production"]
        }
      run-on-pull-requests: true
      enable-preview-deploys: false
