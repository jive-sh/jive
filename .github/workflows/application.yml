name: Build & Deploy Apps

on:
  push:
    branches:
      - main
    paths:
      - 'packages/apps/**'
      - '.github/workflows/application.yml'

jobs:
  compute-apps-to-rebuild:
    runs-on: ubuntu-latest
    outputs:
      changed-apps: ${{ steps.get-changed-apps.outputs.changed-apps }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
        with:
          # Needed to get analyze the latest commit (if any images changed)
          fetch-depth: 2

      - name: Install CI CLI Dependencies
        run: cd ./packages/cmds/chaine && npx --quiet pnpm install

      - name: Get Changed Apps
        id: get-changed-apps
        run: npx --quiet tsx ./packages/cmds/chaine/src/index.tsx cicd packages apps

  deploy-websites:
    needs: compute-apps-to-rebuild
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-apps-to-rebuild.outputs.changed-apps) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Test CICD
        run: echo "About to run the deploy to cloudflare pages for app '${{ matrix.app }}'"

  deploy-mobile-apps:
    needs: compute-apps-to-rebuild
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-apps-to-rebuild.outputs.changed-apps) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Test CICD
        run: echo "hello world ${{ matrix.app }}"
