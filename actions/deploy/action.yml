name: Jive Deploy & Integration Tests
description: |
  Deploy sequentially to passed environments, run integration tests on that environment before continuing to the next env.
  "Preview" as an environment should be passed stand-alone; it's meant for PR runs only.

inputs:
  publish:
    description: Whether to publish the package to npm before deploying
    default: true
  environments:
    description: Deployment environment labels as a comma-separated list (for example, "Staging,Production").
    required: true
  secrets:
    description: Any secrets necessary for the "deploy" and "test:integration" scripts to run 
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
    - name: Add Secrets to Env
      shell: bash
      env:
        SECRETS_JSON: ${{ inputs.secrets }}
      run: |
        bun run - <<'BUN'
          const STEP = "deploy";
          // TODO: move action to its own CLI rather than using composite
          if (typeof process.env.SECRETS_JSON === "string") {
            console.log(`::add-mask::${process.env.SECRETS_JSON}`);
          }
          const secrets = JSON.parse(process.env.SECRETS_JSON || "{}");
          for (const value of Object.values(secrets)) {
            if (value) console.log(`::add-mask::${value}`);
          }
          const requiredSecrets = require('./package.json')?.jive?.requiredSecrets?.[STEP] ?? [];
          const secretsToPass = {};
          const missingSecrets = [];
          for (const requiredSecret of requiredSecrets) {
            if (requiredSecret in secrets) {
              secretsToPass[requiredSecret] = secrets[requiredSecret];
            } else {
              missingSecrets.push(requiredSecret);
            }
          }
          if (missingSecrets.length > 0) {
            console.log(`Missing the following secrets (required for ${STEP}: ${missingSecrets.join(", ")}`);
            process.exit(1);
          }
          for (const [key, value] of Object.entries(secretsToPass)) {
            require("fs").appendFileSync(process.env.GITHUB_ENV, `${key}=${value}\n`);
          }
        BUN
    - name: Setup NPM
      if: inputs.publish == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        registry-url: 'https://registry.npmjs.org'
    - name: Publish Package
      if: inputs.publish == 'true'
      shell: bash
      run: |
        npm publish ./build --provenance
    - name: Deploy To Environments. Run Integration Tests
      shell: bash
      env:
        ENVIRONMENTS: ${{ inputs.environments }}
      run: |
        bun run - <<'BUN'
          const environments = (process.env.ENVIRONMENTS ?? "")
            .split(",")
            .map(e => e.trim())
            .filter(Boolean)
            // Remove duplicates
            .filter((value, index, self) => {
              return self.indexOf(value) === index;
            });
          if (environments.length === 0) {
            console.log("Provide at least one environment");
            process.exit(1);
          }
          if (environments.length > 1 && environments.includes("Preview")) {
            // Preview deploy logic
            console.log("Skipping preview deployment");
            environments.splice(environments.indexOf("Preview"), 1);
          }
          import { spawnSync } from "node:child_process";
          const runCmd = (cmd, args) => {
            const result = spawnSync(cmd, args, { stdio: "inherit", env: { ...process.env } });
            if (result.status !== 0) process.exit(result.status ?? 1);
          };
          for (const environment of environments) {
            console.log(`::group::Deploying to ${environment}`);
            runCmd("bun", ["run", "deploy", environment]);
            console.log("::endgroup::");
            console.log(`::group::Running integration tests against ${environment}`);
            runCmd("bun", ["run", "test:integration", environment]);
            console.log("::endgroup::");
          }
        BUN
